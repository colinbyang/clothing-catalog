<!doctype html>
<html>
  <head>
    <title>Clothing Catalog</title>
    <meta name="description" content="A catalog of clothing items" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Clothing Catalog</h1>
    </header>

    <!-- Controls: search, filters, sort, reset -->
    <div class="controls">
      <input type="text" id="search" placeholder="Search by name..." />
      <select id="filter-type"></select>
      <select id="filter-color"></select>
      <select id="filter-brand"></select>
      <select id="sort">
        <option value="default">Sort: Default</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="name-asc">Name: A → Z</option>
        <option value="name-desc">Name: Z → A</option>
      </select>
      <button onclick="resetFilters()">Reset</button>
      <button id="toggle-form-btn" onclick="toggleForm()">+ Add Item</button>
    </div>

    <!-- Add Item Form (hidden by default) -->
    <div id="add-item-form" style="display: none;">
      <input type="text"   id="new-name"  placeholder="Name *" />
      <input type="text"   id="new-type"  placeholder="Type (e.g. Top) *" />
      <input type="text"   id="new-color" placeholder="Color *" />
      <input type="text"   id="new-size"  placeholder="Size (e.g. M, 32) *" />
      <input type="text"   id="new-brand" placeholder="Brand *" />
      <input type="number" id="new-price" placeholder="Price *" min="0" step="0.01" />
      <input type="text"   id="new-image" placeholder="Image URL (optional)" />
      <button onclick="addItem()">Add to Catalog</button>
    </div>

    <!-- Item count -->
    <p id="item-count" class="item-count"></p>

    <!-- Cards render here -->
    <div id="card-container"></div>

    <!-- Hidden template card — cloned by scripts.js for each item -->
    <div class="card" style="display: none;">
      <div class="card-content">
        <h2>Item Name</h2>
        <img src="" alt="" />
        <ul>
          <li>Detail 1</li>
          <li>Detail 2</li>
          <li>Detail 3</li>
          <li>Detail 4</li>
          <li>Detail 5</li>
        </ul>
        <button class="delete-btn">Remove</button>
      </div>
    </div>

    <script type="text/javascript" src="data.js"></script>
    <script type="text/javascript" src="scripts.js"></script>
  </body>
</html>
